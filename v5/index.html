<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASTEWISE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <span class="logo">TASTEWISE</span>
    </header>

    <main>
        <section class="hero">
            <h1>Discover What You Already Love</h1>
            <p class="tagline">Cross-domain recommendations drawn from your singular taste.</p>
            <div class="search-container">
                <input type="text" class="search-bar" placeholder="A book, a song, a place you adore..." disabled>
            </div>
        </section>

        <hr class="divider">

        <section class="recommendations">
            <p class="section-label">If you love Haruki Murakami, you might also love</p>

            <div class="cards">
                <article class="card">
                    <span class="card-category">Album</span>
                    <h2 class="card-title">Kind of Blue</h2>
                    <p class="card-detail">Miles Davis</p>
                </article>

                <hr class="card-rule">

                <article class="card">
                    <span class="card-category">Restaurant</span>
                    <h2 class="card-title">Ichiran Ramen</h2>
                    <p class="card-detail">Hakata, Japan</p>
                </article>

                <hr class="card-rule">

                <article class="card">
                    <span class="card-category">Film</span>
                    <h2 class="card-title">In the Mood for Love</h2>
                    <p class="card-detail">Wong Kar-wai</p>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <hr class="divider">
        <p>&copy; 2026 Tastewise</p>
    </footer>

</body>
</html>
